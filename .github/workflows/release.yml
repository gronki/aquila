name: Build and release AppImage

on:
  push:
    tags:
      - '*'

jobs:

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build AppImage
        run: sudo bash scripts/build_appimage.sh

      - name: Rename with version tag
        run: mv aquila-x86_64.AppImage aquila-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: "aquila-${{ github.ref_name }}-appimage"
          path: aquila-${{ github.ref_name }}-x86_64.AppImage

  test-appimage:
    name: Test AppImage
    needs: build-appimage
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - {os: "ubuntu", osver: "24.04"}
          - {os: "ubuntu", osver: "22.04"}
          - {os: "debian", osver: "bookworm"}
          - {os: "debian", osver: "trixie"}
    container:
      image: ${{ matrix.os }}:${{ matrix.osver }}

    steps:
      - name: Install tools
        run: apt-get update && apt-get install -y wget git curl gzip tar

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: "aquila-${{ github.ref_name }}-appimage"

      - name: Extract AppImage (no FUSE in container)
        run: |
          chmod +x aquila-${{ github.ref_name }}-x86_64.AppImage
          ./aquila-${{ github.ref_name }}-x86_64.AppImage --appimage-extract > /dev/null
          echo "PATH=$PWD/squashfs-root/usr/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/squashfs-root/usr/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Download test data
        run: scripts/get_test_data.sh

      - name: Run integration test on example data
        run: |
          mkdir testrun
          cd testrun
          ln -s ../examples
          ln -s ../testdata
          ../scripts/test_routine.sh

  release-appimage:
    name: Release AppImage
    runs-on: ubuntu-latest
    needs:
      - test-appimage
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: "aquila-${{ github.ref_name }}-appimage"

      - name: Ensure release exists
        run: |
          if ! gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            gh release create ${{ github.ref_name }} \
              -t "Aquila ${{ github.ref_name }}" \
              -n "Download the AppImage below — it runs on any modern x86_64 Linux without installation."
          fi

      - name: Upload AppImage to release
        run: |
          gh release upload ${{ github.ref_name }} \
            "aquila-${{ github.ref_name }}-x86_64.AppImage" \
            --clobber
