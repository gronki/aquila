name: Build and release AppImage

on:
  push:
    tags:
      - '*'

env:
  VERBOSE: 1

jobs:

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: "ubuntu:22.04", install: "apt-get update && apt-get install -y cmake g++ gfortran  libpng-dev libreadline-dev pkg-config binutils" }
          - { name: "ubuntu:24.04", install: "apt-get update && apt-get install -y cmake g++ gfortran  libpng-dev libreadline-dev pkg-config binutils" }
          - { name: "debian:trixie", install: "apt-get update && apt-get install -y cmake g++ gfortran  libpng-dev libreadline-dev pkg-config binutils" }
          - { name: "debian:bookworm", install: "apt-get update && apt-get install -y cmake g++ gfortran  libpng-dev libreadline-dev pkg-config binutils" }
    container:
      image: ${{ matrix.image.name }}
    name: Test on ${{ matrix.image.name }}
    env:
      CC: "gcc"
      CXX: "g++"
      FC: "gfortran"
    steps:
      - name: Install build dependencies
        run: ${{ matrix.image.install }} wget git curl && gcc --version

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download test data
        run: |
          scripts/get_test_data.sh
          echo "PATH=$PATH:/opt/aquila/bin" >> "$GITHUB_ENV"

      - name: Build and install the app (release, OpenMP)
        run: |
          mkdir -p build
          rm -rf build/*
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DAQUILA_OPENMP=On ..
          cmake --build .
          cmake --install .

      - name: Run unit tests
        run: |
          cd build
          ctest . --output-on-failure

      - name: Run integration test on example data
        run: |
          mkdir testrun
          cd testrun
          ln -s ../examples
          ln -s ../testdata
          ../scripts/test_routine.sh

  build-appimage:
    name: Build AppImage
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build AppImage
        run: sudo bash scripts/build_appimage.sh

      - name: Rename with version tag
        run: mv aquila-x86_64.AppImage aquila-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: "aquila-${{ github.ref_name }}-appimage"
          path: aquila-${{ github.ref_name }}-x86_64.AppImage

  release-appimage:
    name: Release AppImage
    runs-on: ubuntu-latest
    needs: build-appimage
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: "aquila-${{ github.ref_name }}-appimage"

      - name: Ensure release exists
        run: |
          if ! gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            gh release create ${{ github.ref_name }} \
              -t "Aquila ${{ github.ref_name }}" \
              -n "Download the AppImage below — it runs on any modern x86_64 Linux without installation."
          fi

      - name: Upload AppImage to release
        run: |
          gh release upload ${{ github.ref_name }} \
            "aquila-${{ github.ref_name }}-x86_64.AppImage" \
            --clobber
